name: notes_app
description: "Advanced Smart Notes App — Premium production-grade Flutter application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Local database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Preferences
  shared_preferences: ^2.3.2

  # UI & Fonts
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_slidable: ^3.1.1
  flutter_staggered_grid_view: ^0.7.0
  animations: ^2.0.11
  flutter_colorpicker: ^1.1.0

  # Calendar
  table_calendar: ^3.1.2

  # Media
  image_picker: ^1.1.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2

  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
